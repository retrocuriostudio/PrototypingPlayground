<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prototyping Playground</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #000;
      overflow: hidden;
    }

    .video-wrap {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      user-select: none;
      -webkit-user-select: none;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      object-position: center;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="video-wrap" aria-hidden="true">
    <video
      autoplay
      muted
      loop
      playsinline
      disablepictureinpicture
      disableremoteplayback
      poster="LogoRender.png"
      tabindex="-1"
    >
      <source src="LogoLoop.webm" type="video/webm" />
      <source src="LogoLoop.mp4" type="video/mp4" />
    </video>
  </div>
</body>
</html>
